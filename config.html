<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>설정</title>
    <style>
      :root {
        --bg: #1a1a1a;
        --panel: #252525;
        --row: #2a2a2a;
        --input-bg: #333;
        --border: #3a3a3a;
        --text: #fff;
        --text-dim: #888;
        --accent: #d4ff00;
        --tab-active: #3a3a3a;
        --danger: #ff3b30;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Segoe UI', sans-serif;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── 탭 바 ── */
      .tab-bar {
        display: flex;
        gap: 2px;
        background: #111;
        padding: 10px 16px 0;
        flex-shrink: 0;
      }

      .tab-btn {
        background: #222;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--text-dim);
        cursor: pointer;
        padding: 8px 18px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 6px 6px 0 0;
        transition: color 0.1s, background 0.1s;
      }

      .tab-btn:hover { color: var(--text); background: #2a2a2a; }

      .tab-btn.active {
        background: var(--tab-active);
        color: var(--text);
        border-bottom-color: var(--accent);
      }

      /* ── 컨텐츠 영역 ── */
      .tab-content {
        flex: 1;
        overflow-y: auto;
        padding: 24px 20px;
        display: none;
      }

      .tab-content.active { display: block; }

      /* ── 섹션 ── */
      .section { margin-bottom: 28px; }

      .section-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        color: var(--text-dim);
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      /* ── 연결 설정 필드 ── */
      .field-group {
        background: var(--panel);
        border-radius: 8px;
        overflow: hidden;
      }

      .field-row {
        display: flex;
        align-items: center;
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
        gap: 12px;
      }

      .field-row:last-child { border-bottom: none; }

      .field-label {
        width: 130px;
        color: var(--text-dim);
        flex-shrink: 0;
      }

      .field-row input {
        flex: 1;
        background: var(--input-bg);
        border: 1px solid #444;
        border-radius: 5px;
        color: var(--text);
        font-size: 13px;
        padding: 6px 10px;
        outline: none;
        transition: border-color 0.15s;
      }

      .field-row input:focus { border-color: var(--accent); }

      /* ── 채널 / AUX 테이블 ── */
      .ch-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border-radius: 8px;
        overflow: hidden;
      }

      .ch-table thead th {
        text-align: left;
        padding: 10px 14px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.6px;
        color: var(--text-dim);
        text-transform: uppercase;
        background: #1e1e1e;
        border-bottom: 1px solid var(--border);
      }

      .ch-table tbody tr { border-bottom: 1px solid var(--border); }
      .ch-table tbody tr:last-child { border-bottom: none; }

      .ch-table td {
        padding: 7px 10px;
      }

      .ch-table td:first-child {
        width: 40px;
        color: var(--text-dim);
        font-size: 11px;
        text-align: center;
        padding-left: 14px;
      }

      .ch-table input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid #444;
        border-radius: 5px;
        color: var(--text);
        font-size: 13px;
        padding: 5px 9px;
        outline: none;
        transition: border-color 0.15s;
      }

      .ch-table input:focus { border-color: var(--accent); }

      .ch-table input[type='number'] { width: 80px; }

      .note {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 8px;
        line-height: 1.5;
      }

      /* ── OBS 씬/오디오 테이블 ── */
      .obs-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border-radius: 8px;
        overflow: hidden;
      }

      .obs-table thead th {
        text-align: left;
        padding: 10px 14px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.6px;
        color: var(--text-dim);
        text-transform: uppercase;
        background: #1e1e1e;
        border-bottom: 1px solid var(--border);
      }

      .obs-table tbody tr { border-bottom: 1px solid var(--border); }
      .obs-table tbody tr:last-child { border-bottom: none; }

      .obs-table td { padding: 7px 10px; }

      .obs-table td:first-child {
        width: 130px;
        color: var(--text-dim);
        padding-left: 14px;
        font-size: 12px;
      }

      .obs-table input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid #444;
        border-radius: 5px;
        color: var(--text);
        font-size: 13px;
        padding: 5px 9px;
        outline: none;
        transition: border-color 0.15s;
      }

      .obs-table input:focus { border-color: var(--accent); }

      .obs-table input::placeholder { color: #555; }

      /* ── OBS 가져오기 바 ── */
      .fetch-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .btn-fetch {
        padding: 6px 14px;
        background: #2a3a1a;
        border: 1px solid #4a6a2a;
        border-radius: 5px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
        flex-shrink: 0;
      }

      .btn-fetch:hover  { opacity: 0.85; }
      .btn-fetch:active { opacity: 0.65; }
      .btn-fetch:disabled { opacity: 0.4; cursor: default; }

      .fetch-status {
        font-size: 11px;
        color: var(--text-dim);
      }

      .fetch-status.ok  { color: #5dbb5d; }
      .fetch-status.err { color: var(--danger); }

      /* ── 하단 버튼 ── */
      .footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding: 14px 20px;
        background: #111;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      .btn {
        padding: 8px 22px;
        border-radius: 6px;
        border: none;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.1s;
      }

      .btn:hover { opacity: 0.85; }
      .btn:active { opacity: 0.7; }

      .btn-cancel {
        background: #3a3a3a;
        color: var(--text);
      }

      .btn-save {
        background: var(--accent);
        color: #000;
      }

      /* 추가/삭제 버튼 */
      .table-actions {
        margin-top: 8px;
      }

      .btn-add {
        padding: 6px 14px;
        background: #2a3a2a;
        border: 1px solid #4a6a4a;
        border-radius: 5px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .btn-add:hover { opacity: 0.85; }

      .btn-del {
        background: none;
        border: none;
        color: #666;
        font-size: 16px;
        cursor: pointer;
        padding: 2px 8px;
        transition: color 0.15s;
      }
      .btn-del:hover { color: var(--danger); }

      /* 스크롤바 */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
  </head>
  <body>
    <!-- 탭 바 -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="connection">연결</button>
      <button class="tab-btn" data-tab="channels">채널 이름</button>
      <button class="tab-btn" data-tab="aux">AUX 소스</button>
    </div>

    <!-- ── 연결 탭 ── -->
    <div class="tab-content active" id="tab-connection">
      <div class="section">
        <div class="section-title">비디오 스위처 (ATEM)</div>
        <div class="field-group">
          <div class="field-row">
            <span class="field-label">IP 주소</span>
            <input id="atem-ip" type="text" placeholder="192.168.1.240" />
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">OBS WebSocket</div>
        <div class="field-group">
          <div class="field-row">
            <span class="field-label">호스트 (IP)</span>
            <input id="obs-host" type="text" placeholder="localhost" />
          </div>
          <div class="field-row">
            <span class="field-label">포트</span>
            <input id="obs-port" type="number" min="1" max="65535" placeholder="4455" style="max-width:120px" />
          </div>
          <div class="field-row">
            <span class="field-label">비밀번호</span>
            <input id="obs-password" type="password" placeholder="(비어있으면 인증 없음)" />
          </div>
        </div>
      </div>
    </div>

    <!-- ── 채널 이름 탭 ── -->
    <div class="tab-content" id="tab-channels">
      <div class="section">
        <div class="section-title">프로그램 / 프리뷰 버스 채널</div>
        <table class="ch-table">
          <thead>
            <tr>
              <th>#</th>
              <th>ATEM 입력 번호</th>
              <th>표시 이름</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="channels-tbody"></tbody>
        </table>
        <div class="table-actions">
          <button class="btn-add" id="btn-add-channel">+ 채널 추가</button>
        </div>
        <p class="note">* ATEM 입력 번호: 일반 입력 1–20, BLK=0, COL=2001/2002, MP=3010/3020</p>
      </div>
    </div>

    <!-- ── AUX 소스 탭 ── -->
    <div class="tab-content" id="tab-aux">
      <div class="section">
        <div class="section-title">AUX 소스</div>
        <table class="ch-table">
          <thead>
            <tr>
              <th>#</th>
              <th>ATEM 소스 번호</th>
              <th>표시 이름</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="aux-tbody"></tbody>
        </table>
        <div class="table-actions">
          <button class="btn-add" id="btn-add-aux">+ AUX 추가</button>
        </div>
        <p class="note">* 특수 소스: PGM=10010, PVW=10011, Multiview=10013</p>
      </div>
    </div>

    <!-- ── OBS 씬/오디오 탭 ── -->

    <!-- 하단 버튼 -->
    <div class="footer">
      <button class="btn btn-cancel" id="btn-cancel">취소</button>
      <button class="btn btn-save" id="btn-save">저장</button>
    </div>

    <script>
      let currentConfig = null;

      // ── 탭 전환 ──
      document.querySelectorAll('.tab-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach((c) => c.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).classList.add('active');

          // OBS 탭 진입 시 자동 가져오기 (datalist가 비어있을 때만)
          if (btn.dataset.tab === 'obs') {
            const dl = document.getElementById('obs-scenes-list');
            if (dl.children.length === 0) fetchFromOBS();
          }
        });
      });

      // ── 행 번호 갱신 ──
      function renumberRows(tbodyId) {
        const rows = document.querySelectorAll(`#${tbodyId} tr`);
        rows.forEach((tr, i) => { tr.querySelector('td').textContent = i + 1; });
      }

      // ── 채널 테이블 생성 ──
      function addChannelRow(ch = { atemId: 0, label: '' }) {
        const tbody = document.getElementById('channels-tbody');
        const i = tbody.children.length;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td><input type="number" class="ch-atem-id" value="${ch.atemId}" min="0" /></td>
          <td><input type="text" class="ch-label" value="${ch.label}" /></td>
          <td><button class="btn-del" title="삭제">✕</button></td>
        `;
        tr.querySelector('.btn-del').addEventListener('click', () => {
          tr.remove();
          renumberRows('channels-tbody');
        });
        tbody.appendChild(tr);
      }

      function buildChannelsTable(channels) {
        document.getElementById('channels-tbody').innerHTML = '';
        channels.forEach((ch) => addChannelRow(ch));
      }

      // ── AUX 테이블 생성 ──
      function addAuxRow(src = { atemId: 0, label: '' }) {
        const tbody = document.getElementById('aux-tbody');
        const i = tbody.children.length;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td><input type="number" class="aux-atem-id" value="${src.atemId}" min="0" /></td>
          <td><input type="text" class="aux-label" value="${src.label}" /></td>
          <td><button class="btn-del" title="삭제">✕</button></td>
        `;
        tr.querySelector('.btn-del').addEventListener('click', () => {
          tr.remove();
          renumberRows('aux-tbody');
        });
        tbody.appendChild(tr);
      }

      function buildAuxTable(auxSources) {
        document.getElementById('aux-tbody').innerHTML = '';
        auxSources.forEach((src) => addAuxRow(src));
      }

      // ── 설정 로드 ──
      window.configAPI.get().then((cfg) => {
        currentConfig = cfg;

        document.getElementById('atem-ip').value      = cfg.atem?.ip ?? '';
        document.getElementById('obs-host').value     = cfg.obs?.host ?? '';
        document.getElementById('obs-port').value     = cfg.obs?.port ?? 4455;
        document.getElementById('obs-password').value = cfg.obs?.password ?? '';

        buildChannelsTable(cfg.channels ?? []);
        buildAuxTable(cfg.auxSources ?? []);
      });

      // ── 저장 ──
      document.getElementById('btn-save').addEventListener('click', () => {
        // 연결
        const atemIp   = document.getElementById('atem-ip').value.trim();
        const obsHost  = document.getElementById('obs-host').value.trim();
        const obsPort  = parseInt(document.getElementById('obs-port').value, 10);
        const obsPw    = document.getElementById('obs-password').value;

        if (!atemIp) { alert('ATEM IP를 입력하세요.'); return; }
        if (!obsHost) { alert('OBS 호스트를 입력하세요.'); return; }
        if (isNaN(obsPort) || obsPort < 1 || obsPort > 65535) {
          alert('OBS 포트 번호가 올바르지 않습니다.'); return;
        }

        // 채널
        const channels = Array.from(
          document.querySelectorAll('#channels-tbody tr')
        ).map((tr) => ({
          atemId: parseInt(tr.querySelector('.ch-atem-id').value, 10),
          label:  tr.querySelector('.ch-label').value.trim(),
        })).filter((ch) => ch.label);

        // AUX
        const auxSources = Array.from(
          document.querySelectorAll('#aux-tbody tr')
        ).map((tr) => ({
          atemId: parseInt(tr.querySelector('.aux-atem-id').value, 10),
          label:  tr.querySelector('.aux-label').value.trim(),
        })).filter((s) => s.label);

        const newConfig = {
          obs: { host: obsHost, port: obsPort, password: obsPw },
          atem: { ip: atemIp },
          channels,
          auxSources,
        };

        window.configAPI.save(newConfig);
      });

      // ── 채널/AUX 추가 ──
      document.getElementById('btn-add-channel').addEventListener('click', () => addChannelRow());
      document.getElementById('btn-add-aux').addEventListener('click', () => addAuxRow());

      // ── 취소 ──
      document.getElementById('btn-cancel').addEventListener('click', () => {
        window.configAPI.close();
      });
    </script>
  </body>
</html>
